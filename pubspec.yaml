name: aprende_lexico
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.6.1

dependencies:
  flutter:
    sdk: flutter

  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  speech_to_text: ^6.6.0
  record: ^6.1.2
  record_linux: ^1.2.1
  just_audio: ^0.10.5
  path_provider: ^2.0.14
  provider: 6.1.2
  shared_preferences: ^2.2.2
  lottie: ^3.1.0
  file_picker: ^8.0.0
  syncfusion_flutter_pdf: ^24.1.41
  docx_to_text: ^1.0.1
  intl: any
  firebase_core: ^3.15.2
  firebase_auth: ^5.3.0
  firebase_storage: ^12.4.10
  google_sign_in: ^6.2.1
  cloud_firestore: ^5.6.12
  http: ^1.6.0
  flutter_tts: ^4.0.2
  uuid: ^3.0.7
  permission_handler: ^12.0.1
  image_picker: ^1.0.7
  flutter_dotenv: ^6.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.3.6

flutter:
  uses-material-design: true
  generate: true   # 👈 AQUÍ debe ir

  assets:
    - assets/avatar/aria.png
    - assets/lexiga/logo 2.png
    - assets/google.png
    - assets/lexiga/Splash.png
    - assets/lexiga/icono.png

flutter_icons:
    android: true
    ios: true
    image_path: "assets/lexiga/icono.png"
    adaptive_icon_background: "#5B7FFF"
    adaptive_icon_foreground: "assets/lexiga/icono.png"

flutter_native_splash:
  color: "#F4F6FB"
  image: assets/lexiga/Splash.png

  android_12:
    image: assets/lexiga/Splash.png
    color: "#F4F6FB"

  ios: true
  android: true